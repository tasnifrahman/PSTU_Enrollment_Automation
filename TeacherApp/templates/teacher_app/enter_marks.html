<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Marks for {{ course_instructor.courseinfo.course_title }}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>Enter Marks for {{ course_instructor.courseinfo.course_title }}</h1>

        <form method="post">
            {% csrf_token %}
            <table class="table">
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Attendance (Max: 10)</th>
                        <th>Assignment (Max: 5)</th>
                        <th>Mid Exam (Max: 15)</th>
                        <th>Final Exam (Max: 70)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                        <tr>
                            <td>{{ student.student_id }}</td>
                            <td>
                                <input type="number" name="attendance_{{ student.id }}" required max="10" min="0" step="1">
                            </td>
                            <td>
                                <input type="number" name="assignment_{{ student.id }}" required max="5" min="0" step="1">
                            </td>
                            <td>
                                <input type="number" name="mid_exam_{{ student.id }}" required max="15" min="0" step="1">
                            </td>
                            <td>
                                <input type="number" name="final_exam_{{ student.id }}" required max="70" min="0" step="1">
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button type="submit" class="btn btn-primary">Submit Marks</button>
        </form>

        <a href="{% url 'TeacherApp:teacher_dashboard' %}" class="btn btn-secondary mt-3">Back to Dashboard</a>
    </div>
</body>
</html>
